<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#5D473A" />
    <title>Page not found · Conscious Book Club</title>
    <style>
      :root {
        --cbc-bg: #f5f1ea;
        --cbc-primary: #5d473a;
        --cbc-primary-muted: rgba(93, 71, 58, 0.72);
        --cbc-accent: #d19a3e;
        --cbc-paper: #ffffff;
        --cbc-shadow: 0 12px 40px rgba(45, 34, 28, 0.08), 0 0 0 1px rgba(45, 34, 28, 0.06);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 20px 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--cbc-bg);
        color: var(--cbc-primary);
      }
      .bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--cbc-primary), var(--cbc-accent));
      }
      .card {
        width: 100%;
        max-width: 400px;
        background: var(--cbc-paper);
        border-radius: 12px;
        padding: 28px 24px 24px;
        box-shadow: var(--cbc-shadow);
        text-align: center;
      }
      .code {
        font-size: 2.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--cbc-accent);
        margin: 0 0 8px;
        line-height: 1.1;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 12px;
        color: var(--cbc-primary);
      }
      p {
        margin: 0 0 24px;
        font-size: 0.9375rem;
        line-height: 1.55;
        color: var(--cbc-primary-muted);
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      a {
        display: block;
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 600;
        padding: 14px 18px;
        border-radius: 8px;
        transition: opacity 0.15s ease, transform 0.1s ease;
      }
      a:active {
        transform: scale(0.98);
      }
      a.primary {
        background: var(--cbc-primary);
        color: #f5f1ea;
      }
      a.primary:hover {
        opacity: 0.92;
      }
      a.secondary {
        background: transparent;
        color: var(--cbc-primary);
        border: 1px solid rgba(93, 71, 58, 0.25);
      }
      a.secondary:hover {
        background: rgba(93, 71, 58, 0.06);
      }
      .brand {
        margin-top: 28px;
        font-size: 0.8125rem;
        color: var(--cbc-primary-muted);
      }
    </style>
  </head>
  <body>
    <div class="bar" aria-hidden="true"></div>
    <main class="card" role="main">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>
        This address is not valid or the page has moved. You can return to the Conscious Book Club
        landing page or open the app home.
      </p>
      <div class="actions">
        <a class="primary" href="/landing">Back to landing page</a>
        <a class="secondary" href="/">Open app home</a>
      </div>
    </main>
    <p class="brand">Conscious Book Club</p>
  </body>
</html>
